<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clinic Booking</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F5FA;color:#1C2B3A}
input,select,button{font-family:inherit}
a{color:#1A5C75}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── Schedule & exams ─────────────────────────────────────────
const SCH = {6:{s:13,e:17},0:{s:15,e:19},3:{s:14,e:19}};
const EXAMS = [
  {id:"regular",      name:"Regular examination",      desc:"Visual acuity, refraction, and comprehensive eye assessment", price:500},
  {id:"sensorimotor", name:"Sensorimotor examination", desc:"Specialised strabismus evaluation — ocular motility and binocular alignment", price:700},
];

// ── localStorage helpers ─────────────────────────────────────
const ls = {
  get: k => localStorage.getItem(k)||"",
  set: (k,v) => localStorage.setItem(k,v),
};

// ── Google Apps Script API ───────────────────────────────────
function gasUrl(){ return ls.get("clinic_gas_url"); }

async function gasGet(params) {
  const u = gasUrl(); if (!u) return {error:"Not configured"};
  try {
    const url = new URL(u);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
    const r = await fetch(url.toString(), {redirect:"follow"});
    return r.json();
  } catch(e) { return {error:e.message}; }
}

async function gasPost(data) {
  const u = gasUrl(); if (!u) return {error:"Not configured"};
  try {
    const r = await fetch(u, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(data),
      redirect:"follow",
    });
    return r.json();
  } catch(e) { return {error:e.message}; }
}

async function verifyReceipt(examId, price, b64, mime) {
  const key = ls.get("clinic_api_key");
  if (!key) return {verified:false, reason:"No Anthropic API key configured in Admin → Settings."};
  const exam = EXAMS.find(e => e.id === examId);
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:500,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mime||"image/jpeg",data:b64}},
          {type:"text",text:`Verify this Instapay payment receipt for an Egyptian clinic.\nRequired: ${price} EGP for "${exam.name}".\nRespond ONLY with valid JSON (no markdown):\n{"isInstapay":boolean,"amount":number_or_null,"amountMatches":boolean,"transactionRef":"ref_or_null","transactionDate":"date_or_null","verified":boolean,"reason":"one sentence"}\n"verified"=true ONLY if clearly Instapay AND amount=${price} EGP.`}
        ]}]
      })
    });
    const d = await r.json();
    const txt = d.content?.find(c=>c.type==="text")?.text||"{}";
    return JSON.parse(txt.replace(/```json|```/g,"").trim());
  } catch(e) { return {verified:false,reason:"Error: "+e.message}; }
}

// ── Helpers ──────────────────────────────────────────────────
function getSlots(dow) {
  const s=SCH[dow]; if(!s) return [];
  const out=[];
  for(let h=s.s;h<s.e;h++) for(let m=0;m<60;m+=10) out.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
  return out;
}
function fmtT(t) {
  const [h,m]=t.split(":").map(Number),p=h>=12?"PM":"AM",dh=h>12?h-12:h===0?12:h;
  return `${dh}:${String(m).padStart(2,"0")} ${p}`;
}
function dKey(d) {
  if(typeof d==="string") return d;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtD(d) {
  const dt=typeof d==="string"?new Date(d+"T12:00:00"):d;
  return dt.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function upcoming() {
  const dates=[],today=new Date();today.setHours(0,0,0,0);
  for(let i=1;i<=56;i++){const d=new Date(today);d.setDate(today.getDate()+i);if([0,3,6].includes(d.getDay()))dates.push(d);}
  return dates;
}
function toB64(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
}

// ── Design tokens ────────────────────────────────────────────
const T="#1A5C75",TL="#E1F5EE",BG="#F0F5FA",BD="#D8E3EE",TX="#1C2B3A",MT="#6B7A8D",
      GR="#1E7D44",GL="#EAF5ED",RD="#B33A2E",RL="#FDECEA",AM="#B8811E",AL="#FEF6E4";
const b={
  card:{background:"#fff",borderRadius:14,padding:"22px 24px",marginBottom:14,border:`1px solid ${BD}`},
  h1:{fontSize:20,fontWeight:500,color:TX,margin:"0 0 4px"},
  sub:{color:MT,fontSize:13,margin:"0 0 16px"},
  lbl:{fontSize:12,fontWeight:500,color:TX,marginBottom:4,display:"block"},
  inp:{width:"100%",padding:"9px 13px",borderRadius:8,border:`1px solid ${BD}`,fontSize:13,color:TX,outline:"none",boxSizing:"border-box",background:"#fff"},
  btn:{background:T,color:"#fff",border:"none",padding:"11px 24px",borderRadius:9,fontWeight:500,fontSize:14,cursor:"pointer"},
  ghost:{background:"none",border:`1px solid ${BD}`,color:MT,padding:"10px 20px",borderRadius:9,fontWeight:500,fontSize:13,cursor:"pointer"},
  row:{display:"flex",gap:10,marginTop:16,justifyContent:"space-between",alignItems:"center"},
  g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
  sRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${BD}`,fontSize:13},
};

// ── Step 1: Exam type ────────────────────────────────────────
function ExamStep({exam,setExam,onNext}){
  return(
    <div style={b.card}>
      <h1 style={b.h1}>Select examination type</h1>
      <p style={b.sub}>Choose the appointment you need. Payment via Instapay is required before your visit.</p>
      {EXAMS.map(e=>{const sel=exam===e.id;return(
        <div key={e.id} onClick={()=>setExam(e.id)} style={{display:"flex",alignItems:"center",gap:14,border:`2px solid ${sel?T:BD}`,borderRadius:11,padding:"14px 18px",cursor:"pointer",marginBottom:10,background:sel?TL:"#fff",transition:"all 0.15s"}}>
          <div style={{width:38,height:38,borderRadius:9,flexShrink:0,background:sel?T:BG,display:"flex",alignItems:"center",justifyContent:"center",color:sel?"#fff":T}}>
            <i className={`ti ti-${sel?"check":"eye"}`}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:500,fontSize:15,color:TX}}>{e.name}</div>
            <div style={{color:MT,fontSize:12,marginTop:2}}>{e.desc}</div>
          </div>
          <div style={{fontSize:20,fontWeight:500,color:AM,flexShrink:0}}>{e.price.toLocaleString()} <span style={{fontSize:12}}>LE</span></div>
        </div>
      );})}
      <div style={{...b.row,justifyContent:"flex-end"}}>
        <button style={{...b.btn,opacity:exam?1:0.4}} onClick={onNext} disabled={!exam}>Continue <i className="ti ti-arrow-right" style={{marginLeft:4}}/></button>
      </div>
    </div>
  );
}

// ── Step 2: Date & Time ──────────────────────────────────────
function DateStep({selDate,setSelDate,selTime,setSelTime,onBack,onNext}){
  const [booked,setBooked]=useState([]);
  const [loading,setLoading]=useState(false);
  const avail=upcoming();
  const months={};
  avail.forEach(d=>{const k=d.toLocaleDateString("en-GB",{month:"long",year:"numeric"});if(!months[k])months[k]=[];months[k].push(d);});
  const allSlots=selDate?getSlots(selDate.getDay()):[];

  useEffect(()=>{
    if(!selDate) return;
    setLoading(true); setBooked([]);
    gasGet({action:"getSlots",date:dKey(selDate)}).then(r=>{setBooked(r.slots||[]);setLoading(false);});
  },[selDate ? dKey(selDate) : null]);

  return(
    <div>
      <div style={b.card}>
        <h1 style={b.h1}>Choose a date</h1>
        <p style={b.sub}>Clinic days: Saturday · Sunday · Wednesday</p>
        {Object.entries(months).map(([month,dates])=>(
          <div key={month} style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:500,color:MT,letterSpacing:"1px",textTransform:"uppercase",marginBottom:7}}>{month}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {dates.map(d=>{const sel=selDate&&dKey(d)===dKey(selDate);return(
                <button key={dKey(d)} onClick={()=>setSelDate(d)} style={{padding:"9px 12px",borderRadius:10,border:`1.5px solid ${sel?T:BD}`,background:sel?TL:"#fff",cursor:"pointer",textAlign:"center",minWidth:64,color:sel?T:TX,fontWeight:sel?500:400}}>
                  <div style={{fontSize:17,fontWeight:500}}>{d.getDate()}</div>
                  <div style={{fontSize:10,opacity:0.8}}>{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]}</div>
                </button>
              );})}
            </div>
          </div>
        ))}
      </div>
      {selDate&&(
        <div style={b.card}>
          <div style={{fontWeight:500,fontSize:15,color:TX,marginBottom:2}}>Available times</div>
          <p style={b.sub}>{fmtD(selDate)} · Cairo time (EET)</p>
          {loading
            ? <div style={{color:MT,fontSize:13,padding:"8px 0"}}><i className="ti ti-loader" style={{marginRight:5}}/>Loading slots...</div>
            : <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {allSlots.map(t=>{const bk=booked.includes(t),sel=selTime===t;return(
                  <button key={t} onClick={()=>!bk&&setSelTime(t)} disabled={bk} style={{padding:"7px 12px",borderRadius:8,fontSize:12,fontWeight:500,border:`1.5px solid ${bk?RL:sel?T:BD}`,background:bk?RL:sel?TL:"#fff",color:bk?RD:sel?T:TX,cursor:bk?"not-allowed":"pointer",opacity:bk?0.6:1}}>
                    {fmtT(t)}
                  </button>
                );})}
              </div>
          }
          {!loading&&allSlots.length>0&&booked.length===allSlots.length&&(
            <p style={{color:RD,fontSize:12,marginTop:10}}>This day is fully booked — please choose another date.</p>
          )}
        </div>
      )}
      <div style={b.row}>
        <button style={b.ghost} onClick={onBack}><i className="ti ti-arrow-left" style={{marginRight:4}}/> Back</button>
        <button style={{...b.btn,opacity:selDate&&selTime?1:0.4}} onClick={onNext} disabled={!selDate||!selTime}>Continue <i className="ti ti-arrow-right" style={{marginLeft:4}}/></button>
      </div>
    </div>
  );
}

// ── Step 3: Patient info ─────────────────────────────────────
function InfoStep({info,setInfo,onBack,onNext}){
  const set=(k,v)=>setInfo(p=>({...p,[k]:v}));
  const ok=info.name.trim()&&info.phone.trim()&&info.age&&info.gender;
  return(
    <div style={b.card}>
      <h1 style={b.h1}>Your information</h1>
      <p style={b.sub}>Fill in your details. Your phone number is how the clinic will reach you.</p>
      <div style={{marginBottom:12}}>
        <label style={b.lbl}>Full name *</label>
        <input style={b.inp} placeholder="e.g. Ahmed Mohamed" value={info.name} onChange={e=>set("name",e.target.value)}/>
      </div>
      <div style={{...b.g2,marginBottom:12}}>
        <div><label style={b.lbl}>Phone number *</label><input style={b.inp} placeholder="01xxxxxxxxx" value={info.phone} onChange={e=>set("phone",e.target.value)}/></div>
        <div><label style={b.lbl}>Email <span style={{fontWeight:400,color:MT}}>(optional)</span></label><input style={b.inp} type="email" placeholder="your@email.com" value={info.email} onChange={e=>set("email",e.target.value)}/></div>
      </div>
      <div style={b.g2}>
        <div><label style={b.lbl}>Age *</label><input style={b.inp} type="number" placeholder="Your age" min={1} max={120} value={info.age} onChange={e=>set("age",e.target.value)}/></div>
        <div><label style={b.lbl}>Gender *</label>
          <select style={b.inp} value={info.gender} onChange={e=>set("gender",e.target.value)}>
            <option value="">Select...</option><option>Male</option><option>Female</option>
          </select>
        </div>
      </div>
      <div style={b.row}>
        <button style={b.ghost} onClick={onBack}><i className="ti ti-arrow-left" style={{marginRight:4}}/> Back</button>
        <button style={{...b.btn,opacity:ok?1:0.4}} onClick={onNext} disabled={!ok}>Continue <i className="ti ti-arrow-right" style={{marginLeft:4}}/></button>
      </div>
    </div>
  );
}

// ── Step 4: Payment ──────────────────────────────────────────
function PaymentStep({exam,receipt,recPrev,verif,vfying,onFile,onVerify,onBack,onNext}){
  const ref=useRef();
  return(
    <div style={b.card}>
      <h1 style={b.h1}>Payment via Instapay</h1>
      <p style={b.sub}>Send the full amount via Instapay, then upload a screenshot of your receipt.</p>
      <div style={{background:AL,borderRadius:11,padding:"14px 18px",marginBottom:18,border:`1px solid #F0C070`}}>
        <div style={{fontSize:11,fontWeight:500,color:AM,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:3}}>Amount due</div>
        <div style={{fontSize:28,fontWeight:500,color:"#8A5E0A"}}>{exam?.price?.toLocaleString()} <span style={{fontSize:15}}>EGP</span></div>
        <div style={{fontSize:12,color:AM,marginTop:1}}>{exam?.name}</div>
        <div style={{fontSize:12,color:MT,marginTop:6}}>Transfer via <strong>Instapay</strong>, screenshot the confirmation, then upload it below.</div>
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();onFile(e.dataTransfer.files[0]);}}
        style={{border:`2px dashed ${receipt?T:BD}`,borderRadius:11,padding:recPrev?6:26,textAlign:"center",cursor:"pointer",background:"#FAFBFC"}}>
        {recPrev&&receipt?.type?.startsWith("image/")
          ?<img src={recPrev} alt="Receipt" style={{maxWidth:"100%",maxHeight:200,borderRadius:8,objectFit:"contain"}}/>
          :recPrev?<div style={{padding:14,color:T,fontSize:13}}><i className="ti ti-file" style={{fontSize:28,display:"block",marginBottom:4}}/>{receipt.name}</div>
          :<><i className="ti ti-upload" style={{fontSize:32,color:MT,display:"block",marginBottom:8}}/>
            <div style={{fontWeight:500,color:TX,marginBottom:2,fontSize:14}}>Click or drop receipt here</div>
            <div style={{fontSize:12,color:MT}}>JPG, PNG, HEIC or PDF</div></>
        }
        <input ref={ref} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>onFile(e.target.files[0])}/>
      </div>
      {receipt&&!vfying&&!verif&&<button style={{...b.btn,width:"100%",marginTop:10}} onClick={onVerify}><i className="ti ti-scan" style={{marginRight:6}}/>Verify receipt with AI</button>}
      {vfying&&<div style={{textAlign:"center",padding:"12px 0",color:MT,fontSize:13}}><i className="ti ti-loader" style={{marginRight:5}}/>Analysing receipt...</div>}
      {verif&&(
        <div style={{marginTop:12,padding:"13px 14px",borderRadius:10,background:verif.verified?GL:RL,border:`1px solid ${verif.verified?"#A9DFC0":"#F5B7B1"}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <i className={`ti ti-${verif.verified?"circle-check":"circle-x"}`} style={{fontSize:20,color:verif.verified?GR:RD,flexShrink:0,marginTop:1}}/>
          <div>
            <div style={{fontWeight:500,color:verif.verified?GR:RD,fontSize:13}}>{verif.verified?"Receipt verified":"Verification failed"}</div>
            <div style={{fontSize:12,color:TX,marginTop:2}}>{verif.reason}</div>
            {verif.transactionRef&&<div style={{fontSize:11,color:MT,marginTop:2}}>Ref: {verif.transactionRef}</div>}
            {verif.amount&&<div style={{fontSize:11,color:MT}}>Amount detected: {verif.amount} EGP</div>}
          </div>
        </div>
      )}
      {verif&&!verif.verified&&<button style={{...b.ghost,width:"100%",marginTop:8}} onClick={()=>onFile(null)}><i className="ti ti-refresh" style={{marginRight:5}}/>Upload a different receipt</button>}
      <div style={b.row}>
        <button style={b.ghost} onClick={onBack}><i className="ti ti-arrow-left" style={{marginRight:4}}/> Back</button>
        <button style={{...b.btn,opacity:verif?.verified?1:0.4}} onClick={onNext} disabled={!verif?.verified}>Review booking <i className="ti ti-arrow-right" style={{marginLeft:4}}/></button>
      </div>
    </div>
  );
}

// ── Step 5: Review ───────────────────────────────────────────
function ReviewStep({exam,selDate,selTime,info,verif,submitting,onBack,onSubmit}){
  const rows=[
    ["Examination",exam?.name],["Fee",`${exam?.price?.toLocaleString()} EGP`],
    ["Date",fmtD(selDate)],["Time",fmtT(selTime)],
    ["Patient name",info.name],["Phone number",info.phone],
    info.email&&["Email",info.email],
    ["Age / gender",`${info.age} yrs / ${info.gender}`],
    ["Payment","Instapay — verified ✓"],
    verif?.transactionRef&&["Transaction ref",verif.transactionRef],
  ].filter(Boolean);
  return(
    <div style={b.card}>
      <h1 style={b.h1}>Confirm your booking</h1>
      <p style={b.sub}>Please review all details before submitting.</p>
      {rows.map(([k,v],i,a)=>(<div key={k} style={{...b.sRow,borderBottom:i<a.length-1?`1px solid ${BD}`:"none"}}><span style={{color:MT}}>{k}</span><span style={{fontWeight:500,textAlign:"right",maxWidth:"58%"}}>{v}</span></div>))}
      <div style={{background:GL,borderRadius:8,padding:"10px 13px",marginTop:14,fontSize:12,color:GR,display:"flex",gap:7,alignItems:"center"}}>
        <i className="ti ti-shield-check" style={{flexShrink:0}}/>Your payment has been verified. Submitting confirms your appointment.
      </div>
      <div style={b.row}>
        <button style={b.ghost} onClick={onBack}><i className="ti ti-arrow-left" style={{marginRight:4}}/> Back</button>
        <button style={{...b.btn,opacity:submitting?0.6:1}} onClick={onSubmit} disabled={submitting}>{submitting?"Confirming...":"Confirm appointment"}</button>
      </div>
    </div>
  );
}

// ── Confirmation ─────────────────────────────────────────────
function ConfirmView({booking,onNew}){
  const exam=EXAMS.find(e=>e.id===booking.examType);
  const rows=[["Booking ID",booking.id],["Exam",exam?.name],["Date",fmtD(booking.date)],["Time",fmtT(booking.time)],["Name",booking.patientName],["Phone",booking.phone]];
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:BG,padding:20}}>
      <div style={{...b.card,maxWidth:460,width:"100%",textAlign:"center",padding:"36px 28px",marginBottom:0}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:GL,border:`2px solid #A9DFC0`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <i className="ti ti-check" style={{fontSize:30,color:GR}}/>
        </div>
        <h1 style={{...b.h1,textAlign:"center",fontSize:21,marginBottom:5}}>Appointment confirmed!</h1>
        <p style={{color:MT,fontSize:13,marginBottom:20}}>Your booking is received. Please be on time.</p>
        <div style={{background:BG,borderRadius:11,padding:"14px 16px",textAlign:"left",marginBottom:18}}>
          {rows.map(([k,v],i,a)=>(<div key={k} style={{...b.sRow,borderBottom:i<a.length-1?`1px solid ${BD}`:"none"}}><span style={{color:MT}}>{k}</span><span style={{fontWeight:500,color:k==="Booking ID"?T:TX}}>{v}</span></div>))}
        </div>
        <p style={{fontSize:12,color:MT,marginBottom:18}}>{ls.get("clinic_name")||"The clinic"} has been notified. Please arrive 5 minutes early.</p>
        <button style={b.btn} onClick={onNew}>Book another appointment</button>
      </div>
    </div>
  );
}

// ── Admin view ───────────────────────────────────────────────
function AdminView({onLogout}){
  const [tab,setTab]=useState("appointments");
  const [bks,setBks]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filter,setFilter]=useState("");
  const [sett,setSett]=useState({
    clinicName:ls.get("clinic_name")||"",
    doctorEmail:"",
    secretaryEmail:"",
    apiKey:ls.get("clinic_api_key")||"",
    gasUrl:ls.get("clinic_gas_url")||"",
    adminPin:ls.get("clinic_admin_pin")||"1234",
  });
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const adminPin=ls.get("clinic_admin_pin")||"1234";
  const today=dKey(new Date());

  useEffect(()=>{
    if(tab!=="appointments") return;
    setLoading(true);
    gasGet({action:"getBookings",pin:adminPin}).then(r=>{setBks(r.bookings||[]);setLoading(false);});
  },[tab]);

  const filtered=[...bks]
    .filter(b=>{if(!filter) return true; const f=filter.toLowerCase(); return b.name?.toLowerCase().includes(f)||b.date?.includes(f)||b.phone?.includes(f)||String(b.id)?.toLowerCase().includes(f);})
    .sort((a,bk)=>(a.date+a.time).localeCompare(bk.date+bk.time));

  async function saveSettings(){
    setSaving(true); setMsg("");
    ls.set("clinic_name",sett.clinicName);
    ls.set("clinic_api_key",sett.apiKey);
    ls.set("clinic_gas_url",sett.gasUrl);
    ls.set("clinic_admin_pin",sett.adminPin);
    const r=await gasPost({action:"saveSettings",currentPin:adminPin,clinicName:sett.clinicName,doctorEmail:sett.doctorEmail,secretaryEmail:sett.secretaryEmail,adminPin:sett.adminPin});
    setSaving(false);
    setMsg(r.success?"Settings saved ✓":(r.error||"Save failed — check your Apps Script URL"));
  }

  async function cancel(id){
    if(!window.confirm("Cancel this appointment?")) return;
    const r=await gasPost({action:"cancel",id,pin:adminPin});
    if(r.success) setBks(prev=>prev.map(bk=>bk.id===id?{...bk,status:"cancelled"}:bk));
    else alert("Error: "+r.error);
  }

  return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"system-ui,sans-serif",color:TX}}>
      <div style={{background:T,color:"#fff",padding:"0 20px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <span style={{fontWeight:500,fontSize:15}}><i className="ti ti-settings" style={{marginRight:7}}/>Admin panel — {ls.get("clinic_name")||"Clinic"}</span>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",padding:"5px 13px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:500}}>Exit admin</button>
        </div>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
          {[["Total",bks.length,TX],["Today",bks.filter(b=>b.status!=="cancelled"&&b.date===today).length,T],["Upcoming",bks.filter(b=>b.status!=="cancelled"&&b.date>=today).length,AM]].map(([lbl,ct,c])=>(
            <div key={lbl} style={{background:"#fff",borderRadius:11,padding:"14px 18px",border:`1px solid ${BD}`,borderLeft:`3px solid ${c}`}}>
              <div style={{fontSize:24,fontWeight:500,color:c}}>{ct}</div>
              <div style={{fontSize:11,color:MT,marginTop:1}}>{lbl} appointments</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:14}}>
          {["appointments","settings"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:500,fontSize:13,background:tab===t?T:"#fff",color:tab===t?"#fff":MT}}>
              <i className={`ti ti-${t==="appointments"?"calendar":"adjustments"}`} style={{marginRight:5}}/>{t==="appointments"?"Appointments":"Settings"}
            </button>
          ))}
        </div>
        {tab==="appointments"&&<>
          <input style={{...b.inp,marginBottom:12}} placeholder="Search by name, date (YYYY-MM-DD), phone, or ID..." value={filter} onChange={e=>setFilter(e.target.value)}/>
          {loading&&<div style={{...b.card,textAlign:"center",color:MT,padding:40}}><i className="ti ti-loader" style={{fontSize:26,display:"block",marginBottom:6}}/>Loading appointments...</div>}
          {!loading&&filtered.length===0&&<div style={{...b.card,textAlign:"center",color:MT,padding:40}}><i className="ti ti-calendar-off" style={{fontSize:28,display:"block",marginBottom:6}}/>No appointments found.</div>}
          {filtered.map(bk=>{
            const exam=EXAMS.find(e=>e.id===bk.examtype),isPast=bk.date<today;
            const [sbg,sc]=bk.status==="cancelled"?[RL,RD]:isPast?["#F5F5F5",MT]:[GL,GR];
            return(
              <div key={bk.id} style={{...b.card,marginBottom:9,opacity:bk.status==="cancelled"?0.65:1}}>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:14,color:TX}}>{bk.name}</div>
                    <div style={{color:MT,fontSize:12,marginTop:1}}>{bk.phone}{bk.email?` · ${bk.email}`:""}</div>
                    <div style={{fontSize:12,marginTop:5}}><strong>{fmtD(bk.date)}</strong> at <strong>{fmtT(bk.time)}</strong></div>
                    <div style={{fontSize:12,color:T,marginTop:2}}>{exam?.name||bk.examname} — {Number(bk.price)?.toLocaleString()} EGP</div>
                    <div style={{fontSize:11,color:MT,marginTop:1}}>Age: {bk.age} · {bk.gender}{bk.txref?` · Ref: ${bk.txref}`:""}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
                    <span style={{padding:"3px 11px",borderRadius:20,fontSize:10,fontWeight:500,background:sbg,color:sc}}>{bk.status==="cancelled"?"Cancelled":isPast?"Past":"Confirmed"}</span>
                    {bk.status!=="cancelled"&&!isPast&&<button onClick={()=>cancel(bk.id)} style={{fontSize:11,color:RD,background:"none",border:`1px solid #F5B7B1`,padding:"3px 9px",borderRadius:6,cursor:"pointer"}}>Cancel</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </>}
        {tab==="settings"&&(
          <div style={b.card}>
            <h2 style={{fontSize:17,fontWeight:500,color:TX,marginBottom:4}}>Settings</h2>
            <p style={b.sub}>Update clinic info, email recipients, and API keys.</p>
            {[
              {k:"clinicName",     lbl:"Clinic name",                               t:"text",    ph:"e.g. Dr. Smith Ophthalmology Clinic"},
              {k:"doctorEmail",    lbl:"Doctor's email (notifications)",             t:"email",   ph:"doctor@example.com"},
              {k:"secretaryEmail", lbl:"Secretary's email (notifications)",          t:"email",   ph:"secretary@example.com"},
              {k:"adminPin",       lbl:"Admin PIN",                                  t:"password",ph:"4+ digit PIN"},
              {k:"gasUrl",         lbl:"Google Apps Script URL",                     t:"url",     ph:"https://script.google.com/macros/s/.../exec"},
              {k:"apiKey",         lbl:"Anthropic API key (receipt verification)",   t:"password",ph:"sk-ant-..."},
            ].map(({k,lbl,t,ph})=>(
              <div key={k} style={{marginBottom:12}}>
                <label style={b.lbl}>{lbl}</label>
                <input type={t} placeholder={ph} value={sett[k]||""} onChange={e=>setSett(p=>({...p,[k]:e.target.value}))} style={b.inp}/>
              </div>
            ))}
            {msg&&<div style={{padding:"8px 12px",borderRadius:7,marginBottom:12,fontSize:13,background:msg.includes("✓")?GL:RL,color:msg.includes("✓")?GR:RD}}>{msg}</div>}
            <button style={{...b.btn,opacity:saving?0.6:1}} onClick={saveSettings} disabled={saving}><i className="ti ti-device-floppy" style={{marginRight:5}}/>{saving?"Saving...":"Save settings"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Setup wizard (first-time only) ───────────────────────────
function SetupView({onDone}){
  const [step,setStep]=useState(1);
  const [gasU,setGasU]=useState("");
  const [apiK,setApiK]=useState("");
  const [name,setName]=useState("");
  const [pin,setPin]=useState("1234");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  const GAS_INSTRUCTIONS = [
    "Go to sheets.new — create a new Google Sheet (any name)",
    "Click Extensions → Apps Script in the menu bar",
    "Delete all existing code in the editor",
    "Download and open the file clinic_backend.gs, copy all its contents",
    "Paste the code into Apps Script, then Save (Ctrl+S)",
    "Click Deploy → New deployment → Web app",
    "Set 'Execute as: Me' and 'Who has access: Anyone'",
    "Click Deploy, then Authorize when prompted",
    "Copy the Web App URL and paste it in Step 3 below",
  ];

  async function finish(){
    if(!gasU.trim()){setErr("Please enter the Apps Script Web App URL.");return;}
    setSaving(true); setErr("");
    ls.set("clinic_gas_url",gasU.trim());
    if(apiK.trim()) ls.set("clinic_api_key",apiK.trim());
    if(name.trim()) ls.set("clinic_name",name.trim());
    ls.set("clinic_admin_pin",pin||"1234");
    const r=await gasPost({action:"saveSettings",currentPin:"",clinicName:name,adminPin:pin});
    setSaving(false);
    if(r.success||r.error==="Unknown action") onDone();
    else setErr("Could not reach the Apps Script URL. Please check it and try again. Error: "+(r.error||"unknown"));
  }

  return(
    <div style={{maxWidth:620,margin:"0 auto",padding:"32px 16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:TL,border:`1px solid ${BD}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <i className="ti ti-settings" style={{fontSize:26,color:T}}/>
        </div>
        <h1 style={{...b.h1,textAlign:"center",fontSize:22}}>One-time setup</h1>
        <p style={{color:MT,fontSize:14,marginTop:4}}>This takes about 5 minutes. You'll never need to do it again.</p>
      </div>

      <div style={b.card}>
        <div style={{display:"flex",gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${BD}`}}>
          {["Create backend","Connect app"].map((lbl,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",opacity:step===i+1?1:0.45}} onClick={()=>setStep(i+1)}>
              <div style={{width:24,height:24,borderRadius:"50%",background:step===i+1?T:BD,color:step===i+1?"#fff":MT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500}}>{i+1}</div>
              <span style={{fontSize:12,fontWeight:step===i+1?500:400,color:step===i+1?T:MT}}>{lbl}</span>
              {i===0&&<span style={{color:BD,fontSize:14,marginLeft:4}}>—</span>}
            </div>
          ))}
        </div>

        {step===1&&(
          <div>
            <h2 style={{...b.h1,fontSize:17,marginBottom:10}}>Set up Google Sheets backend</h2>
            <p style={{color:MT,fontSize:13,marginBottom:14}}>This stores bookings and sends email notifications — for free, using your Google account.</p>
            <ol style={{paddingLeft:20,color:TX,fontSize:13,lineHeight:"2.1"}}>
              {GAS_INSTRUCTIONS.map((step,i)=><li key={i} dangerouslySetInnerHTML={{__html:step.replace("sheets.new","<a href='https://sheets.new' target='_blank'>sheets.new</a>").replace("clinic_backend.gs","<strong>clinic_backend.gs</strong>")}}/>)}
            </ol>
            <div style={{background:TL,borderRadius:8,padding:"10px 14px",marginTop:14,fontSize:12,color:"#0E6655",display:"flex",gap:8,alignItems:"flex-start"}}>
              <i className="ti ti-info-circle" style={{flexShrink:0,marginTop:1}}/>
              <span>The file <strong>clinic_backend.gs</strong> was provided alongside this HTML file. If you don't have it, ask for it again.</span>
            </div>
            <button style={{...b.btn,marginTop:16}} onClick={()=>setStep(2)}>I've deployed it — next <i className="ti ti-arrow-right" style={{marginLeft:4}}/></button>
          </div>
        )}

        {step===2&&(
          <div>
            <h2 style={{...b.h1,fontSize:17,marginBottom:10}}>Connect the app</h2>
            <div style={{marginBottom:12}}>
              <label style={b.lbl}>Apps Script Web App URL *</label>
              <input style={b.inp} placeholder="https://script.google.com/macros/s/.../exec" value={gasU} onChange={e=>setGasU(e.target.value)}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={b.lbl}>Clinic name</label>
              <input style={b.inp} placeholder="e.g. Dr. Smith Ophthalmology Clinic" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={b.lbl}>Admin PIN <span style={{fontWeight:400,color:MT}}>(to access the admin panel)</span></label>
              <input style={b.inp} type="password" placeholder="default: 1234" value={pin} onChange={e=>setPin(e.target.value)}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={b.lbl}>Anthropic API key <span style={{fontWeight:400,color:MT}}>(for AI receipt verification)</span></label>
              <input style={b.inp} type="password" placeholder="sk-ant-..." value={apiK} onChange={e=>setApiK(e.target.value)}/>
              <div style={{fontSize:11,color:MT,marginTop:4}}>
                Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Without it, receipts can't be verified by AI but patients can still book.
              </div>
            </div>
            <div style={{background:AL,borderRadius:7,padding:"10px 13px",marginBottom:14,fontSize:12,color:AM}}>
              <i className="ti ti-info-circle" style={{marginRight:5}}/>
              Doctor and secretary emails are added in Admin → Settings after setup.
            </div>
            {err&&<div style={{background:RL,borderRadius:7,padding:"10px 13px",marginBottom:12,fontSize:12,color:RD}}>{err}</div>}
            <div style={{display:"flex",gap:10}}>
              <button style={b.ghost} onClick={()=>setStep(1)}><i className="ti ti-arrow-left" style={{marginRight:4}}/>Back</button>
              <button style={{...b.btn,flex:1,opacity:saving?0.6:1}} onClick={finish} disabled={saving}>
                <i className="ti ti-check" style={{marginRight:5}}/>{saving?"Connecting...":"Complete setup"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Admin login ──────────────────────────────────────────────
function AdminLogin({onSuccess,onBack}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  function tryLogin(){
    if(pin===(ls.get("clinic_admin_pin")||"1234")){onSuccess();}else{setErr(true);}
  }
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:BG,fontFamily:"system-ui,sans-serif"}}>
      <div style={{...b.card,width:300,textAlign:"center",padding:"32px 26px",marginBottom:0}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:TL,border:`1px solid ${BD}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><i className="ti ti-lock" style={{fontSize:24,color:T}}/></div>
        <h2 style={{...b.h1,textAlign:"center",fontSize:18,marginBottom:4}}>Admin access</h2>
        <p style={{color:MT,fontSize:12,marginBottom:16}}>{ls.get("clinic_name")||"Clinic"}</p>
        <input type="password" placeholder="PIN" value={pin}
          onChange={e=>{setPin(e.target.value);setErr(false);}}
          onKeyDown={e=>{if(e.key==="Enter") tryLogin();}}
          style={{...b.inp,textAlign:"center",fontSize:20,letterSpacing:8,marginBottom:7,borderColor:err?RD:BD}}
        />
        {err&&<p style={{color:RD,fontSize:12,marginBottom:7}}>Incorrect PIN</p>}
        <button style={{...b.btn,width:"100%",marginBottom:8}} onClick={tryLogin}>Enter</button>
        <button style={{...b.ghost,width:"100%"}} onClick={onBack}><i className="ti ti-arrow-left" style={{marginRight:4}}/>Back</button>
      </div>
    </div>
  );
}

// ── Main app ─────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("booking");
  const [step,setStep]=useState(1);
  const [examType,setExamType]=useState(null);
  const [selDate,setSelDate]=useState(null);
  const [selTime,setSelTime]=useState(null);
  const [info,setInfo]=useState({name:"",phone:"",email:"",age:"",gender:""});
  const [receipt,setReceipt]=useState(null);
  const [recPrev,setRP]=useState(null);
  const [recB64,setRB]=useState(null);
  const [verif,setVerif]=useState(null);
  const [vfying,setVF]=useState(false);
  const [submitting,setSub]=useState(false);
  const [confirmed,setConf]=useState(null);
  const [showSetup,setShowSetup]=useState(!ls.get("clinic_gas_url"));

  if(showSetup) return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"system-ui,sans-serif"}}>
      <SetupView onDone={()=>setShowSetup(false)}/>
    </div>
  );

  if(view==="confirm") return <ConfirmView booking={confirmed} onNew={()=>{setStep(1);setExamType(null);setSelDate(null);setSelTime(null);setInfo({name:"",phone:"",email:"",age:"",gender:""});setReceipt(null);setRP(null);setRB(null);setVerif(null);setView("booking");}}/>;
  if(view==="admin_login") return <AdminLogin onSuccess={()=>setView("admin")} onBack={()=>setView("booking")}/>;
  if(view==="admin") return <AdminView onLogout={()=>setView("booking")}/>;

  const exam=EXAMS.find(e=>e.id===examType);
  const cName=ls.get("clinic_name")||"Ophthalmology Clinic";
  const STEPS=["Exam type","Date & time","Your info","Payment","Review"];

  async function onVerify(){
    if(!recB64) return;
    setVF(true); setVerif(null);
    const res=await verifyReceipt(examType,exam.price,recB64,receipt.type);
    setVerif(res); setVF(false);
  }

  async function onSubmit(){
    if(!verif?.verified||submitting) return;
    setSub(true);
    const r=await gasPost({
      action:"book", examType, examName:exam.name, price:exam.price,
      date:dKey(selDate), time:selTime,
      patientName:info.name, phone:info.phone, email:info.email, age:info.age, gender:info.gender,
      transactionRef:verif.transactionRef||null, transactionDate:verif.transactionDate||null,
    });
    setSub(false);
    if(r.success){
      setConf({id:r.id,examType,date:dKey(selDate),time:selTime,patientName:info.name,phone:info.phone});
      setView("confirm");
    } else {
      alert("Booking failed: "+(r.error||"Unknown error. Please try again."));
    }
  }

  async function handleFile(file){
    if(!file){setReceipt(null);setRP(null);setRB(null);setVerif(null);return;}
    setReceipt(file); setRP(URL.createObjectURL(file)); setRB(await toB64(file)); setVerif(null);
  }

  return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"system-ui,sans-serif",color:TX}}>
      <header style={{background:T,color:"#fff"}}>
        <div style={{maxWidth:760,margin:"0 auto",padding:"0 18px",display:"flex",alignItems:"center",justifyContent:"space-between",height:62}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:9,background:"rgba(255,255,255,0.18)",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-eye" style={{fontSize:20,color:"#fff"}}/></div>
            <div>
              <div style={{fontWeight:500,fontSize:16}}>{cName}</div>
              <div style={{fontSize:10,opacity:0.75}}>Online appointment booking</div>
            </div>
          </div>
          <button onClick={()=>setView("admin_login")} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",padding:"5px 13px",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:500}}>
            Admin <i className="ti ti-external-link" style={{marginLeft:2,fontSize:10}}/>
          </button>
        </div>
      </header>

      <div style={{background:"#fff",borderBottom:`1px solid ${BD}`,padding:"12px 18px"}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center"}}>
          {STEPS.map((lbl,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:i<STEPS.length-1?1:"auto"}}>
              <div style={{display:"flex",alignItems:"center",width:"100%"}}>
                <div style={{width:25,height:25,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,background:step>i+1?GR:step===i+1?T:"#E0E8F0",color:step>=i+1?"#fff":MT}}>
                  {step>i+1?<i className="ti ti-check" style={{fontSize:12}}/>:i+1}
                </div>
                {i<STEPS.length-1&&<div style={{flex:1,height:2,background:step>i+1?GR:"#E0E8F0",margin:"0 3px",marginBottom:14}}/>}
              </div>
              <span style={{fontSize:9,color:step===i+1?T:MT,fontWeight:step===i+1?500:400,marginTop:2,whiteSpace:"nowrap"}}>{lbl}</span>
            </div>
          ))}
        </div>
      </div>

      <main style={{maxWidth:760,margin:"0 auto",padding:"20px 16px 50px"}}>
        {step===1&&<ExamStep exam={examType} setExam={setExamType} onNext={()=>setStep(2)}/>}
        {step===2&&<DateStep selDate={selDate} setSelDate={d=>{setSelDate(d);setSelTime(null);}} selTime={selTime} setSelTime={setSelTime} onBack={()=>setStep(1)} onNext={()=>setStep(3)}/>}
        {step===3&&<InfoStep info={info} setInfo={setInfo} onBack={()=>setStep(2)} onNext={()=>setStep(4)}/>}
        {step===4&&<PaymentStep exam={exam} receipt={receipt} recPrev={recPrev} verif={verif} vfying={vfying} onFile={handleFile} onVerify={onVerify} onBack={()=>setStep(3)} onNext={()=>setStep(5)}/>}
        {step===5&&<ReviewStep exam={exam} selDate={selDate} selTime={selTime} info={info} verif={verif} submitting={submitting} onBack={()=>setStep(4)} onSubmit={onSubmit}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
