// ── Google Apps Script API ───────────────────────────────────
function gasUrl(){ return ls.get("clinic_gas_url"); }

async function gasGet(params) {
  const u = gasUrl(); if (!u) return {error:"Not configured"};
  try {
    const url = new URL(u);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
    const r = await fetch(url.toString(), {redirect:"follow"});
    return r.json();
  } catch(e) { return {error:e.message}; }
}

async function gasPost(data) {
  const u = gasUrl(); if (!u) return {error:"Not configured"};
  try {
    const r = await fetch(u, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(data),
      redirect:"follow",
    });
    return r.json();
  } catch(e) { return {error:e.message}; }
}

async function verifyReceipt(examId, price, b64, mime, examName) {
  const key = ls.get("clinic_api_key");
  if (!key) return {verified:false, reason:"No Anthropic API key configured in Admin → Settings."};
  const recipientHandle = ls.get("clinic_instapay_handle") || "";
  const recipientInstruction = recipientHandle
    ? `The receipt's "To" field must show the recipient as "${recipientHandle}" (or a clearly matching variant, accounting for partially masked names like "AHMED M****** R*** E***** A*****"). If the "To" field shows a different, unrelated recipient handle, this is NOT a valid payment to this clinic — set verified to false and explain the mismatch in "reason".`
    : `No clinic recipient handle is configured, so recipient cannot be checked — note this in "reason" but do not fail verification solely for that reason.`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:500,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mime||"image/jpeg",data:b64}},
          {type:"text",text:`Verify this Instapay payment receipt for an Egyptian clinic.\nRequired amount: ${price} EGP for "${examName}".\n${recipientInstruction}\nRespond ONLY with valid JSON (no markdown):\n{"isInstapay":boolean,"amount":number_or_null,"amountMatches":boolean,"recipientMatches":boolean,"recipientFound":"handle_or_name_seen_or_null","transactionRef":"ref_or_null","transactionDate":"date_or_null","verified":boolean,"reason":"one sentence"}\n"verified"=true ONLY if clearly Instapay AND amount=${price} EGP AND recipient matches (when a recipient handle was provided to check against).`}
        ]}]
      })
    });
    const d = await r.json();
    const txt = d.content?.find(c=>c.type==="text")?.text||"{}";
    return JSON.parse(txt.replace(/```json|```/g,"").trim());
  } catch(e) { return {verified:false,reason:"Error: "+e.message}; }
}

// ── Helpers ──────────────────────────────────────────────────
function getSlots(dow, schedule) {
  const sch = schedule || SCH_DEFAULT;
  const s = sch[dow];
  if(!s || !s.enabled) return [];
  const out=[];
  for(let h=s.start;h<s.end;h++) for(let m=0;m<60;m+=10) out.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
  return out;
}
function fmtT(t,lang) {
  const [h,m]=t.split(":").map(Number);
  const dh=h>12?h-12:h===0?12:h;
  if(lang==="ar"){
    const p=h>=12?"م":"ص";
    return `${dh}:${String(m).padStart(2,"0")} ${p}`;
  }
  const p=h>=12?"PM":"AM";
  return `${dh}:${String(m).padStart(2,"0")} ${p}`;
}
function dKey(d) {
  if(typeof d==="string") return d;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtD(d,lang) {
  const dt=typeof d==="string"?new Date(d+"T12:00:00"):d;
  const locale = lang==="ar" ? "ar-EG-u-nu-latn" : "en-GB";
  return dt.toLocaleDateString(locale,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function dayShort(d,lang){
  const locale = lang==="ar" ? "ar-EG-u-nu-latn" : "en-GB";
  return d.toLocaleDateString(locale,{weekday:"short"});
}
function monthYear(d,lang){
  const locale = lang==="ar" ? "ar-EG-u-nu-latn" : "en-GB";
  return d.toLocaleDateString(locale,{month:"long",year:"numeric"});
}
function upcoming(schedule) {
  const sch = schedule || SCH_DEFAULT;
  const enabledDays = Object.keys(sch).filter(d=>sch[d].enabled).map(Number);
  const dates=[],today=new Date();today.setHours(0,0,0,0);
  for(let i=1;i<=56;i++){const d=new Date(today);d.setDate(today.getDate()+i);if(enabledDays.includes(d.getDay()))dates.push(d);}
  return dates;
}
function toB64(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
}

  inp:{width:"100%",padding:"9px 13px",borderRadius:8,border:`1px solid ${BD}`,fontSize:13,color:TX,outline:"none",boxSizing:"border-box",background:"#fff"},
  btn:{background:T,color:"#fff",border:"none",padding:"11px 24px",borderRadius:9,fontWeight:500,fontSize:14,cursor:"pointer"},
  ghost:{background:"none",border:`1px solid ${BD}`,color:MT,padding:"10px 20px",borderRadius:9,fontWeight:500,fontSize:13,cursor:"pointer"},
  row:{display:"flex",gap:10,marginTop:16,justifyContent:"space-between",alignItems:"center"},
  g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
  sRow:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${BD}`,fontSize:13},
};

// Back/next icon flips direction in RTL
function BackIcon({lang}){ return <i className={`ti ti-arrow-${lang==="ar"?"right":"left"}`} style={{marginInlineEnd:4}}/>; }
function FwdIcon({lang}){ return <i className={`ti ti-arrow-${lang==="ar"?"left":"right"}`} style={{marginInlineStart:4}}/>; }

// ── Step 1: Exam type ────────────────────────────────────────
function ExamStep({exam,setExam,onNext,t,lang}){
  const EXAMS = [
    {id:"regular",name:t.exam.regularName,desc:t.exam.regularDesc,price:EXAM_PRICE.regular},
    {id:"sensorimotor",name:t.exam.sensoName,desc:t.exam.sensoDesc,price:EXAM_PRICE.sensorimotor},
  ];
  return(
    <div style={bs.card}>
      <h1 style={bs.h1}>{t.exam.title}</h1>
      <p style={bs.sub}>{t.exam.sub}</p>
      {EXAMS.map(e=>{const sel=exam===e.id;return(
        <div key={e.id} onClick={()=>setExam(e.id)} style={{display:"flex",alignItems:"center",gap:14,border:`2px solid ${sel?T:BD}`,borderRadius:11,padding:"14px 18px",cursor:"pointer",marginBottom:10,background:sel?TL:"#fff",transition:"all 0.15s"}}>
          <div style={{width:38,height:38,borderRadius:9,flexShrink:0,background:sel?T:BG,display:"flex",alignItems:"center",justifyContent:"center",color:sel?"#fff":T}}>
            <i className={`ti ti-${sel?"check":"eye"}`}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:500,fontSize:15,color:TX}}>{e.name}</div>
            <div style={{color:MT,fontSize:12,marginTop:2}}>{e.desc}</div>
          </div>
          <div style={{fontSize:20,fontWeight:600,color:AM,flexShrink:0}}>{e.price.toLocaleString()} <span style={{fontSize:12,fontWeight:500}}>{t.exam.currency}</span></div>
        </div>
      );})}
      <div style={{...bs.row,justifyContent:"flex-end"}}>
        <button style={{...bs.btn,opacity:exam?1:0.4}} onClick={onNext} disabled={!exam}>{t.exam.continue} <FwdIcon lang={lang}/></button>
      </div>
    </div>
  );
}

// ── Step 2: Date & Time ──────────────────────────────────────
function DateStep({selDate,setSelDate,selTime,setSelTime,onBack,onNext,t,lang,schedule}){
  const [booked,setBooked]=useState([]);
  const [loading,setLoading]=useState(false);
  const avail=upcoming(schedule);
  const months={};
  avail.forEach(d=>{const k=monthYear(d,lang);if(!months[k])months[k]=[];months[k].push(d);});
  const allSlots=selDate?getSlots(selDate.getDay(),schedule):[];

  useEffect(()=>{
    if(!selDate) return;
    setLoading(true); setBooked([]);
    gasGet({action:"getSlots",date:dKey(selDate)}).then(r=>{setBooked(r.slots||[]);setLoading(false);});
  },[selDate ? dKey(selDate) : null]);

  return(
    <div>
      <div style={bs.card}>
        <h1 style={bs.h1}>{t.date.title}</h1>
        <p style={bs.sub}>{t.date.sub}</p>
        {Object.entries(months).map(([month,dates])=>(
          <div key={month} style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:600,color:MT,letterSpacing:"1px",textTransform:"uppercase",marginBottom:7}}>{month}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {dates.map(d=>{const sel=selDate&&dKey(d)===dKey(selDate);return(
                <button key={dKey(d)} onClick={()=>setSelDate(d)} style={{padding:"9px 12px",borderRadius:10,border:`1.5px solid ${sel?T:BD}`,background:sel?TL:"#fff",cursor:"pointer",textAlign:"center",minWidth:64,color:sel?T:TX,fontWeight:sel?600:400}}>
                  <div style={{fontSize:17,fontWeight:600}}>{d.getDate()}</div>
                  <div style={{fontSize:10,opacity:0.8}}>{dayShort(d,lang)}</div>
                </button>
              );})}
            </div>
          </div>
        ))}
      </div>
      {selDate&&(
        <div style={bs.card}>
          <div style={{fontWeight:600,fontSize:15,color:TX,marginBottom:2}}>{t.date.availTimes}</div>
          <p style={bs.sub}>{fmtD(selDate,lang)} · {t.date.cairoTime}</p>
          {loading
            ? <div style={{color:MT,fontSize:13,padding:"8px 0"}}><i className="ti ti-loader" style={{marginInlineEnd:5}}/>{t.date.loading}</div>
            : <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {allSlots.map(time=>{const bk=booked.includes(time),sel=selTime===time;return(
                  <button key={time} onClick={()=>!bk&&setSelTime(time)} disabled={bk} style={{padding:"7px 12px",borderRadius:8,fontSize:12,fontWeight:500,border:`1.5px solid ${bk?RL:sel?T:BD}`,background:bk?RL:sel?TL:"#fff",color:bk?RD:sel?T:TX,cursor:bk?"not-allowed":"pointer",opacity:bk?0.6:1}}>
                    {fmtT(time,lang)}
                  </button>
                );})}
              </div>
          }
          {!loading&&allSlots.length>0&&booked.length===allSlots.length&&(
            <p style={{color:RD,fontSize:12,marginTop:10}}>{t.date.fullyBooked}</p>
          )}
        </div>
      )}
      <div style={bs.row}>
        <button style={bs.ghost} onClick={onBack}><BackIcon lang={lang}/>{t.date.back}</button>
        <button style={{...bs.btn,opacity:selDate&&selTime?1:0.4}} onClick={onNext} disabled={!selDate||!selTime}>{t.date.continue} <FwdIcon lang={lang}/></button>
      </div>
    </div>
  );
}

// ── Step 3: Patient info ─────────────────────────────────────

  const set=(k,v)=>setInfo(p=>({...p,[k]:v}));
  const ok=info.name.trim()&&info.phone.trim()&&info.age&&info.gender;
  return(
    <div style={bs.card}>
      <h1 style={bs.h1}>{t.info.title}</h1>

      <div style={{marginBottom:12}}>
        <label style={bs.lbl}>{t.info.name}</label>
        <input style={bs.inp} placeholder={t.info.namePh} value={info.name} onChange={e=>set("name",e.target.value)}/>
      </div>
      <div style={{...bs.g2,marginBottom:12}}>
        <div><label style={bs.lbl}>{t.info.phone}</label><input style={bs.inp} placeholder={t.info.phonePh} value={info.phone} onChange={e=>set("phone",e.target.value)}/></div>
        <div><label style={bs.lbl}>{t.info.email} <span style={{fontWeight:400,color:MT}}>{t.info.emailOpt}</span></label><input style={bs.inp} type="email" placeholder={t.info.emailPh} value={info.email} onChange={e=>set("email",e.target.value)}/></div>
      </div>
      <div style={bs.g2}>

        <div><label style={bs.lbl}>{t.info.gender}</label>

      <div style={bs.row}>
        <button style={bs.ghost} onClick={onBack}><BackIcon lang={lang}/>{t.info.back}</button>
        <button style={{...bs.btn,opacity:ok?1:0.4}} onClick={onNext} disabled={!ok}>{t.info.continue} <FwdIcon lang={lang}/></button>
      </div>
    </div>
  );
}

      {!hasKey&&(

// ── Step 5: Review ───────────────────────────────────────────

  return(

// ── Admin view ───────────────────────────────────────────────
function AdminView({onLogout,t,lang,clinicName}){
  const [tab,setTab]=useState("appointments");
  const [bks,setBks]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filter,setFilter]=useState("");
  const [sett,setSett]=useState({
    clinicName:ls.get("clinic_name")||"",
    doctorEmail:"",
    secretaryEmail:"",
    apiKey:ls.get("clinic_api_key")||"",
    instapayHandle:ls.get("clinic_instapay_handle")||"",
    instapayLink:ls.get("clinic_instapay_link")||"",
    gasUrl:ls.get("clinic_gas_url")||"",
    adminPin:ls.get("clinic_admin_pin")||"1234",
  });
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const [schedule,setSchedule]=useState(SCH_DEFAULT);
  const [schedSaving,setSchedSaving]=useState(false);
  const [schedMsg,setSchedMsg]=useState("");
  const adminPin=ls.get("clinic_admin_pin")||"1234";
  const today=dKey(new Date());

  useEffect(()=>{
    gasGet({action:"getSchedule"}).then(r=>{ if(r && r.schedule) setSchedule(r.schedule); });
  },[]);

  async function saveSchedule(){
    setSchedSaving(true); setSchedMsg("");
    const r=await gasPost({action:"saveSchedule",pin:adminPin,schedule});
    setSchedSaving(false);
    if(r.success){
      ls.set("clinic_schedule", JSON.stringify(schedule));
      setSchedMsg(t.admin.scheduleSaved);
    } else {
      setSchedMsg(r.error||t.admin.scheduleSaveFail);
    }
  }
  function setDay(d,patch){
    setSchedule(prev=>({...prev,[d]:{...prev[d],...patch}}));
  }

  useEffect(()=>{
    if(tab!=="appointments") return;
    setLoading(true);
    gasGet({action:"getBookings",pin:adminPin}).then(r=>{setBks(r.bookings||[]);setLoading(false);});
  },[tab]);

  const filtered=[...bks]
    .filter(b=>{if(!filter) return true; const f=filter.toLowerCase(); return b.name?.toLowerCase().includes(f)||b.date?.includes(f)||b.phone?.includes(f)||String(b.id)?.toLowerCase().includes(f);})
    .sort((a,bk)=>(a.date+a.time).localeCompare(bk.date+bk.time));

  async function saveSettings(){
    setSaving(true); setMsg("");
    ls.set("clinic_name",sett.clinicName);
    ls.set("clinic_api_key",sett.apiKey);
    ls.set("clinic_instapay_handle",sett.instapayHandle);
    ls.set("clinic_instapay_link",sett.instapayLink);
    ls.set("clinic_gas_url",sett.gasUrl);
    ls.set("clinic_admin_pin",sett.adminPin);
    const r=await gasPost({action:"saveSettings",currentPin:adminPin,clinicName:sett.clinicName,doctorEmail:sett.doctorEmail,secretaryEmail:sett.secretaryEmail,adminPin:sett.adminPin});
    setSaving(false);
    setMsg(r.success?t.admin.savedOk:(r.error||t.admin.saveFail));
  }

  async function cancel(id){
    if(!window.confirm(lang==="ar"?"هل تريد إلغاء هذا الموعد؟":"Cancel this appointment?")) return;
    const r=await gasPost({action:"cancel",id,pin:adminPin});
    if(r.success) setBks(prev=>prev.map(bk=>bk.id===id?{...bk,status:"cancelled"}:bk));
    else alert("Error: "+r.error);
  }

  function examName(id){ return id==="regular" ? t.exam.regularName : id==="sensorimotor" ? t.exam.sensoName : id; }

  return(
    <div style={{minHeight:"100vh",background:BG,color:TX}}>
      <div style={{background:T,color:"#fff",padding:"0 20px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <span style={{fontWeight:600,fontSize:15}}><i className="ti ti-settings" style={{marginInlineEnd:7}}/>{t.admin.panelTitle} — {clinicName}</span>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",padding:"5px 13px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:500}}>{t.admin.exitAdmin}</button>
        </div>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
          {[[t.admin.total,bks.length,TX],[t.admin.today,bks.filter(b=>b.status!=="cancelled"&&b.date===today).length,T],[t.admin.upcoming,bks.filter(b=>b.status!=="cancelled"&&b.date>=today).length,AM]].map(([lbl,ct,c])=>(
            <div key={lbl} style={{background:"#fff",borderRadius:11,padding:"14px 18px",border:`1px solid ${BD}`,borderInlineStart:`3px solid ${c}`}}>
              <div style={{fontSize:24,fontWeight:600,color:c}}>{ct}</div>
              <div style={{fontSize:11,color:MT,marginTop:1}}>{lbl}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:14}}>
          {[["appointments",t.admin.appointmentsTab,"calendar"],["settings",t.admin.settingsTab,"adjustments"]].map(([id,lbl,icon])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:500,fontSize:13,background:tab===id?T:"#fff",color:tab===id?"#fff":MT}}>
              <i className={`ti ti-${icon}`} style={{marginInlineEnd:5}}/>{lbl}
            </button>
          ))}
        </div>
        {tab==="appointments"&&<>
          <input style={{...bs.inp,marginBottom:12}} placeholder={t.admin.searchPh} value={filter} onChange={e=>setFilter(e.target.value)}/>
          {loading&&<div style={{...bs.card,textAlign:"center",color:MT,padding:40}}><i className="ti ti-loader" style={{fontSize:26,display:"block",marginBottom:6}}/>{t.admin.loadingAppointments}</div>}
          {!loading&&filtered.length===0&&<div style={{...bs.card,textAlign:"center",color:MT,padding:40}}><i className="ti ti-calendar-off" style={{fontSize:28,display:"block",marginBottom:6}}/>{t.admin.noAppointments}</div>}
          {filtered.map(bk=>{
            const isPast=bk.date<today;
            const [sbg,sc]=bk.status==="cancelled"?[RL,RD]:isPast?["#F5F5F5",MT]:[GL,GR];
            return(
              <div key={bk.id} style={{...bs.card,marginBottom:9,opacity:bk.status==="cancelled"?0.65:1}}>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14,color:TX}}>{bk.name}</div>
                    <div style={{color:MT,fontSize:12,marginTop:1}}>{bk.phone}{bk.email?` · ${bk.email}`:""}</div>
                    <div style={{fontSize:12,marginTop:5}}><strong>{fmtD(bk.date,lang)}</strong> {lang==="ar"?"في":"at"} <strong>{fmtT(bk.time,lang)}</strong></div>
                    <div style={{fontSize:12,color:T,marginTop:2}}>{examName(bk.examtype)||bk.examname} — {Number(bk.price)?.toLocaleString()} EGP</div>
                    <div style={{fontSize:11,color:MT,marginTop:1}}>{t.admin.age}: {bk.age} · {bk.gender}{bk.txref?` · ${t.admin.ref}: ${bk.txref}`:""}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
                    <span style={{padding:"3px 11px",borderRadius:20,fontSize:10,fontWeight:600,background:sbg,color:sc}}>{bk.status==="cancelled"?t.admin.cancelled:isPast?t.admin.past:t.admin.confirmed}</span>
                    {bk.status!=="cancelled"&&!isPast&&<button onClick={()=>cancel(bk.id)} style={{fontSize:11,color:RD,background:"none",border:`1px solid #F5B7B1`,padding:"3px 9px",borderRadius:6,cursor:"pointer"}}>{t.admin.cancelBtn}</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </>}
        {tab==="settings"&&(
          <>
          <div style={bs.card}>
            <h2 style={{fontSize:17,fontWeight:600,color:TX,marginBottom:4}}>{t.admin.settingsTitle}</h2>
            <p style={bs.sub}>{t.admin.settingsSub}</p>
            {[
              {k:"clinicName",lbl:t.admin.clinicName,ty:"text",ph:t.admin.clinicNamePh},
              {k:"doctorEmail",lbl:t.admin.doctorEmail,ty:"email",ph:t.admin.doctorEmailPh},
              {k:"secretaryEmail",lbl:t.admin.secretaryEmail,ty:"email",ph:t.admin.secretaryEmailPh},
              {k:"adminPin",lbl:t.admin.adminPin,ty:"password",ph:t.admin.adminPinPh},
              {k:"gasUrl",lbl:t.admin.gasUrl,ty:"url",ph:t.admin.gasUrlPh},
              {k:"apiKey",lbl:t.admin.apiKey,ty:"password",ph:t.admin.apiKeyPh},
              {k:"instapayHandle",lbl:t.admin.instapayHandle,ty:"text",ph:t.admin.instapayHandlePh},
              {k:"instapayLink",lbl:t.admin.instapayLink,ty:"url",ph:t.admin.instapayLinkPh},
            ].map(({k,lbl,ty,ph})=>(
              <div key={k} style={{marginBottom:12}}>
                <label style={bs.lbl}>{lbl}</label>
                <input type={ty} placeholder={ph} value={sett[k]||""} onChange={e=>setSett(p=>({...p,[k]:e.target.value}))} style={bs.inp}/>
              </div>
            ))}
            {msg&&<div style={{padding:"8px 12px",borderRadius:7,marginBottom:12,fontSize:13,background:msg.includes("✓")?GL:RL,color:msg.includes("✓")?GR:RD}}>{msg}</div>}
            <button style={{...bs.btn,opacity:saving?0.6:1}} onClick={saveSettings} disabled={saving}><i className="ti ti-device-floppy" style={{marginInlineEnd:5}}/>{saving?t.admin.saving:t.admin.saveBtn}</button>
          </div>
          <div style={bs.card}>
            <h2 style={{fontSize:17,fontWeight:600,color:TX,marginBottom:4}}>{t.admin.scheduleTitle}</h2>
            <p style={bs.sub}>{t.admin.scheduleSub}</p>
            {(lang==="ar"?DAY_NAMES_AR:DAY_NAMES_EN).map((dn,d)=>{
              const day=schedule[d]||{enabled:false,start:9,end:17};
              return(
                <div key={d} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${BD}`,flexWrap:"wrap"}}>
                  <label style={{display:"flex",alignItems:"center",gap:7,minWidth:130,cursor:"pointer"}}>
                    <input type="checkbox" checked={!!day.enabled} onChange={e=>setDay(d,{enabled:e.target.checked})}/>
                    <span style={{fontWeight:500,fontSize:13,color:TX}}>{dn}</span>
                  </label>
                  {day.enabled ? (
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <select style={{...bs.inp,width:90,padding:"6px 8px"}} value={day.start} onChange={e=>setDay(d,{start:Number(e.target.value)})}>
                        {Array.from({length:24},(_,h)=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
                      </select>
                      <span style={{color:MT,fontSize:12}}>–</span>
                      <select style={{...bs.inp,width:90,padding:"6px 8px"}} value={day.end} onChange={e=>setDay(d,{end:Number(e.target.value)})}>
                        {Array.from({length:24},(_,h)=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}
                      </select>
                    </div>
                  ) : <span style={{color:MT,fontSize:12}}>{t.admin.closed}</span>}
                </div>
              );
            })}
            {schedMsg&&<div style={{padding:"8px 12px",borderRadius:7,margin:"12px 0",fontSize:13,background:schedMsg.includes("✓")?GL:RL,color:schedMsg.includes("✓")?GR:RD}}>{schedMsg}</div>}
            <button style={{...bs.btn,opacity:schedSaving?0.6:1,marginTop:12}} onClick={saveSchedule} disabled={schedSaving}><i className="ti ti-device-floppy" style={{marginInlineEnd:5}}/>{schedSaving?t.admin.saving:t.admin.saveScheduleBtn}</button>
          </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Setup wizard (first-time only) ───────────────────────────
function SetupView({onDone,t,lang}){
  const [step,setStep]=useState(1);
  const [gasU,setGasU]=useState("");
  const [apiK,setApiK]=useState("");
  const [instapayH,setInstapayH]=useState("");
  const [instapayL,setInstapayL]=useState("");
  const [name,setName]=useState("");
  const [pin,setPin]=useState("1234");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  async function finish(){
    if(!gasU.trim()){setErr(t.setup.errNoUrl);return;}
    setSaving(true); setErr("");
    ls.set("clinic_gas_url",gasU.trim());
    if(apiK.trim()) ls.set("clinic_api_key",apiK.trim());
    if(instapayH.trim()) ls.set("clinic_instapay_handle",instapayH.trim());
    if(instapayL.trim()) ls.set("clinic_instapay_link",instapayL.trim());
    if(name.trim()) ls.set("clinic_name",name.trim());
    ls.set("clinic_admin_pin",pin||"1234");
    const r=await gasPost({action:"saveSettings",currentPin:"",clinicName:name,adminPin:pin});
    setSaving(false);
    if(r.success||r.error==="Unknown action") onDone();
    else setErr(t.setup.errConnect+" "+(r.error||"unknown"));
  }

  return(
    <div style={{maxWidth:620,margin:"0 auto",padding:"32px 16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:TL,border:`1px solid ${BD}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <i className="ti ti-settings" style={{fontSize:26,color:T}}/>
        </div>
        <h1 style={{...bs.h1,textAlign:"center",fontSize:22}}>{t.setup.title}</h1>
        <p style={{color:MT,fontSize:14,marginTop:4}}>{t.setup.sub}</p>
      </div>

      <div style={bs.card}>
        <div style={{display:"flex",gap:8,marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${BD}`}}>
          {[t.setup.step1,t.setup.step2].map((lbl,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",opacity:step===i+1?1:0.45}} onClick={()=>setStep(i+1)}>
              <div style={{width:24,height:24,borderRadius:"50%",background:step===i+1?T:BD,color:step===i+1?"#fff":MT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600}}>{i+1}</div>
              <span style={{fontSize:12,fontWeight:step===i+1?600:400,color:step===i+1?T:MT}}>{lbl}</span>
            </div>
          ))}
        </div>

        {step===1&&(
          <div>
            <h2 style={{...bs.h1,fontSize:17,marginBottom:10}}>{t.setup.gasTitle}</h2>
            <p style={{color:MT,fontSize:13,marginBottom:14}}>{t.setup.gasDesc}</p>
            <ol style={{paddingInlineStart:20,color:TX,fontSize:13,lineHeight:"2.1"}}>
              {t.setup.gasSteps.map((s,i)=><li key={i}>{
                s.includes("sheets.new")
                  ? <>{s.split("sheets.new")[0]}<a href="https://sheets.new" target="_blank">sheets.new</a>{s.split("sheets.new")[1]}</>
                  : s.includes("clinic_backend.gs")
                  ? <>{s.split("clinic_backend.gs")[0]}<strong>clinic_backend.gs</strong>{s.split("clinic_backend.gs")[1]}</>
                  : s
              }</li>)}
            </ol>
            <div style={{background:TL,borderRadius:8,padding:"10px 14px",marginTop:14,fontSize:12,color:"#0A4A40",display:"flex",gap:8,alignItems:"flex-start"}}>
              <i className="ti ti-info-circle" style={{flexShrink:0,marginTop:1}}/>
              <span>{t.setup.noteText}</span>
            </div>
            <button style={{...bs.btn,marginTop:16}} onClick={()=>setStep(2)}>{t.setup.nextBtn} <FwdIcon lang={lang}/></button>
          </div>
        )}

        {step===2&&(
          <div>
            <h2 style={{...bs.h1,fontSize:17,marginBottom:10}}>{t.setup.connectTitle}</h2>
            <div style={{marginBottom:12}}>
              <label style={bs.lbl}>{t.setup.gasUrlLabel}</label>
              <input style={bs.inp} placeholder={t.setup.gasUrlPh} value={gasU} onChange={e=>setGasU(e.target.value)}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={bs.lbl}>{t.setup.clinicNameLabel}</label>
              <input style={bs.inp} placeholder={t.setup.clinicNamePh} value={name} onChange={e=>setName(e.target.value)}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={bs.lbl}>{t.setup.pinLabel} <span style={{fontWeight:400,color:MT}}>{t.setup.pinSub}</span></label>
              <input style={bs.inp} type="password" placeholder={t.setup.pinPh} value={pin} onChange={e=>setPin(e.target.value)}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={bs.lbl}>{t.setup.apiKeyLabel} <span style={{fontWeight:400,color:MT}}>{t.setup.apiKeySub}</span></label>
              <input style={bs.inp} type="password" placeholder={t.setup.apiKeyPh} value={apiK} onChange={e=>setApiK(e.target.value)}/>
              <div style={{fontSize:11,color:MT,marginTop:4}}>{t.setup.apiKeyNote}</div>
            </div>
            <div style={{marginBottom:16}}>
              <label style={bs.lbl}>{t.admin.instapayHandle}</label>
              <input style={bs.inp} placeholder={t.admin.instapayHandlePh} value={instapayH} onChange={e=>setInstapayH(e.target.value)}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={bs.lbl}>{t.admin.instapayLink}</label>
              <input style={bs.inp} placeholder={t.admin.instapayLinkPh} value={instapayL} onChange={e=>setInstapayL(e.target.value)}/>
            </div>
            <div style={{background:AL,borderRadius:7,padding:"10px 13px",marginBottom:14,fontSize:12,color:AM}}>
              <i className="ti ti-info-circle" style={{marginInlineEnd:5}}/>{t.setup.emailNote}
            </div>
            {err&&<div style={{background:RL,borderRadius:7,padding:"10px 13px",marginBottom:12,fontSize:12,color:RD}}>{err}</div>}
            <div style={{display:"flex",gap:10}}>
              <button style={bs.ghost} onClick={()=>setStep(1)}><BackIcon lang={lang}/>{t.setup.back}</button>
              <button style={{...bs.btn,flex:1,opacity:saving?0.6:1}} onClick={finish} disabled={saving}>
                <i className="ti ti-check" style={{marginInlineEnd:5}}/>{saving?t.setup.connecting:t.setup.completeBtn}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main app ─────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState(ls.get("clinic_lang")||"en");
  const t = TR[lang];
  const [view,setView]=useState("booking");
  const [step,setStep]=useState(1);
  const [examType,setExamType]=useState(null);
  const [selDate,setSelDate]=useState(null);
  const [selTime,setSelTime]=useState(null);
  const [info,setInfo]=useState({name:"",phone:"",email:"",age:"",gender:""});
  const [receipt,setReceipt]=useState(null);
  const [recPrev,setRP]=useState(null);
  const [recB64,setRB]=useState(null);
  const [verif,setVerif]=useState(null);
  const [vfying,setVF]=useState(false);
  const [submitting,setSub]=useState(false);
  const [confirmed,setConf]=useState(null);
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzrf-ldOWWGyozq5kV66n_zCRYNInZ4oJTuc-9DwPTE1kmxItluth2MZGOrtRrdDBrA0w/exec";
  if(!ls.get("clinic_gas_url")) ls.set("clinic_gas_url", BACKEND_URL);
  const [showSetup,setShowSetup]=useState(false);
  const [schedule,setSchedule]=useState(()=>{
    const cached = ls.get("clinic_schedule");
    if(cached){ try{ return JSON.parse(cached); }catch(e){} }
    return SCH_DEFAULT;
  });

  useEffect(()=>{
    gasGet({action:"getSchedule"}).then(r=>{
      if(r && r.schedule){
        setSchedule(r.schedule);
        ls.set("clinic_schedule", JSON.stringify(r.schedule));
      }
    });
  },[]);

  useEffect(()=>{
    document.documentElement.lang = lang;
    document.documentElement.dir = t.dir;
    document.body.className = lang==="ar" ? "lang-ar" : "";
  },[lang]);

  function toggleLang(){
    const next = lang==="en" ? "ar" : "en";
    ls.set("clinic_lang",next);
    setLang(next);
  }

  if(showSetup) return(
    <div style={{minHeight:"100vh",background:BG}}>
      <div style={{display:"flex",justifyContent:"flex-end",padding:"16px 16px 0"}}>
        <button onClick={toggleLang} style={{background:"#fff",border:`1px solid ${BD}`,color:T,padding:"6px 14px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}}>
          <i className="ti ti-language" style={{marginInlineEnd:5}}/>{t.langBtn}
        </button>
      </div>
      <SetupView onDone={()=>setShowSetup(false)} t={t} lang={lang}/>
    </div>
  );

  const examName = id => id==="regular" ? t.exam.regularName : t.exam.sensoName;
  const cName = ls.get("clinic_name") || (lang==="ar" ? "عيادة طب العيون" : "Ophthalmology Clinic");
  const exam = examType ? {id:examType, name:examName(examType), price:EXAM_PRICE[examType]} : null;

  if(view==="confirm") return <ConfirmView booking={confirmed} clinicName={cName} t={t} lang={lang} onNew={()=>{setStep(1);setExamType(null);setSelDate(null);setSelTime(null);setInfo({name:"",phone:"",email:"",age:"",gender:""});setReceipt(null);setRP(null);setRB(null);setVerif(null);setView("booking");}}/>;
  if(view==="admin_login") return <AdminLogin onSuccess={()=>setView("admin")} onBack={()=>setView("booking")} t={t} lang={lang} clinicName={cName}/>;
  if(view==="admin") return <AdminView onLogout={()=>setView("booking")} t={t} lang={lang} clinicName={cName}/>;

  async function onVerify(){
    if(!recB64) return;
    setVF(true); setVerif(null);
    const res=await verifyReceipt(examType,exam.price,recB64,receipt.type,exam.name);
    setVerif(res); setVF(false);
  }

  function onManualConfirm(){
    setVerif({verified:true, manual:true, reason:t.payment.manualPendingReason});
  }

  async function onSubmit(){
    if(!verif?.verified||submitting) return;
    setSub(true);
    const r=await gasPost({
      action:"book", examType, examName:exam.name, price:exam.price,
      date:dKey(selDate), time:selTime,
      patientName:info.name, phone:info.phone, email:info.email, age:info.age, gender:info.gender,
      transactionRef:verif.transactionRef||null, transactionDate:verif.transactionDate||null,
    });
    setSub(false);
    if(r.success){
      setConf({id:r.id,examType,date:dKey(selDate),time:selTime,patientName:info.name,phone:info.phone});
      setView("confirm");
    } else {
      alert((lang==="ar"?"فشل الحجز: ":"Booking failed: ")+(r.error||"Unknown error. Please try again."));
    }
  }

  async function handleFile(file){
    if(!file){setReceipt(null);setRP(null);setRB(null);setVerif(null);return;}
    setReceipt(file); setRP(URL.createObjectURL(file)); setRB(await toB64(file)); setVerif(null);
  }

  return(
    <div style={{minHeight:"100vh",background:BG,color:TX}}>
      <header style={{background:`linear-gradient(135deg, ${T} 0%, ${T2} 100%)`,color:"#fff"}}>
        <div style={{maxWidth:760,margin:"0 auto",padding:"0 18px",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:9,background:"rgba(255,255,255,0.18)",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ti ti-eye" style={{fontSize:20,color:"#fff"}}/></div>
            <div>
              <div style={{fontWeight:600,fontSize:16}}>{cName}</div>
              <div style={{fontSize:10,opacity:0.8}}>{t.clinicTagline}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={toggleLang} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",padding:"5px 13px",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600}}>
              {t.langBtn}
            </button>
            <button onClick={()=>setView("admin_login")} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",padding:"5px 13px",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:500}}>
              <i className="ti ti-external-link" style={{fontSize:10,marginInlineEnd:2}}/>{lang==="ar"?"الإدارة":"Admin"}
            </button>
          </div>
        </div>
      </header>

      <div style={{background:"#fff",borderBottom:`1px solid ${BD}`,padding:"12px 18px"}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",alignItems:"center"}}>
          {t.steps.map((lbl,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:i<t.steps.length-1?1:"auto"}}>
              <div style={{display:"flex",alignItems:"center",width:"100%"}}>
                <div style={{width:25,height:25,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,background:step>i+1?GR:step===i+1?T:"#E0E8F0",color:step>=i+1?"#fff":MT}}>
                  {step>i+1?<i className="ti ti-check" style={{fontSize:12}}/>:i+1}
                </div>
                {i<t.steps.length-1&&<div style={{flex:1,height:2,background:step>i+1?GR:"#E0E8F0",margin:"0 3px",marginBottom:14}}/>}
              </div>
              <span style={{fontSize:9,color:step===i+1?T:MT,fontWeight:step===i+1?600:400,marginTop:2,whiteSpace:"nowrap"}}>{lbl}</span>
            </div>
          ))}
        </div>
      </div>

      <main style={{maxWidth:760,margin:"0 auto",padding:"20px 16px 50px"}}>
        {step===1&&<ExamStep exam={examType} setExam={setExamType} onNext={()=>setStep(2)} t={t} lang={lang}/>}
        {step===2&&<DateStep selDate={selDate} setSelDate={d=>{setSelDate(d);setSelTime(null);}} selTime={selTime} setSelTime={setSelTime} onBack={()=>setStep(1)} onNext={()=>setStep(3)} t={t} lang={lang} schedule={schedule}/>}
        {step===3&&<InfoStep info={info} setInfo={setInfo} onBack={()=>setStep(2)} onNext={()=>setStep(4)} t={t} lang={lang}/>}
        {step===4&&<PaymentStep exam={exam} receipt={receipt} recPrev={recPrev} verif={verif} vfying={vfying} onFile={handleFile} onVerify={onVerify} onManualConfirm={onManualConfirm} onBack={()=>setStep(3)} onNext={()=>setStep(5)} t={t} lang={lang}/>}
        {step===5&&<ReviewStep exam={exam} selDate={selDate} selTime={selTime} info={info} verif={verif} submitting={submitting} onBack={()=>setStep(4)} onSubmit={onSubmit} t={t} lang={lang}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
